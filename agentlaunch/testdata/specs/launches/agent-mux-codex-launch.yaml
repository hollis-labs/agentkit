# cross-product sample 2/5 — same project, codex-cli runner. In the
# legacy catalog this was a SEPARATE launch file purely because the
# provider differed; per D3 provider is now just the `runner` input.
spec: tether.launch
name: agent-mux-codex-launch
inputs:
