id: nanite.backend.main
display_name: "Nanite — Backend"

identity:
  lineage_alias:   nanite.backend.main
  lineage_id:      ""          # pending — Agent Mux will issue agtln_<ulid>
  profile_id:      nanite-backend
  profile_version: 1
  role:            backend
  project:         nanite
  work_root:       ~/Projects-apps/nanite
  tracking_root:   ~/Projects-apps/agent-workspaces/execution/nanite/nanite-backend/
  vanta_primary:   "2026-04-19"

slots:
  # §1 — role definition
  agent:
    type: role_summary
    path: ~/.nanite/roles/domain/backend/worker.md

  # §2 — resume now: recent session-close records
  # Vanta recall (configure when CLI available):
  #   conduit_lookup namespace=user/$USER/knowledge/session-close/nanite limit=3 ranking=chronological
  # Fallback: reads current manual boot prompt until session-close records accumulate
  recap:
    type: cmd
    run: |
      if [ -f "$HOME/Projects-apps/agent-workspaces/boot/nanite/boot-prompt.md" ]; then
        head -60 "$HOME/Projects-apps/agent-workspaces/boot/nanite/boot-prompt.md"
      else
        echo "(no recap available — configure vanta recall)"
      fi
    timeout: 5s

  # §4 — active state
  history:
    type: cmd
    run: "git -C ~/Projects-apps/nanite log --oneline -20 2>/dev/null || echo '(git unavailable)'"
    timeout: 5s

  status:
    type: cmd
    run: "cd ~/Projects-apps/nanite 2>/dev/null && git status --short -b 2>/dev/null || echo '(git status unavailable)'"
    timeout: 5s

  # Clockwork tasks — uncomment when clockwork CLI is available:
  # tasks:
  #   type: cmd
  #   run: "clockwork tasks list --project-id PRJ-20260417-0002 --status in_progress --format brief 2>/dev/null"
  #   timeout: 10s

  # §5 — durable context
  # Memory — configure vanta recall when CLI is available:
  #   memory_recall namespace=user/$USER/memory tags=["scope:nanite.backend.main"] limit=20 ranking=activation
  memory:
    type: cmd
    run: |
      echo "[ memory slot: configure vanta recall — memory_recall namespace=user/$USER/memory tags=[scope:nanite.backend.main] ]"
    timeout: 3s

  skills:
    type: skill_index
    limit: 8
    prefer_triggers:
      - capture
      - vanta
      - end
      - session
      - backlog
      - backend
      - refactor
